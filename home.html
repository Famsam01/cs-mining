<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS Mining</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="identification">
      <div class="logo">
        <img src="images/Untitled design.jpg" alt="CS Mining Logo" />
      </div>
      <h1>9160850195 <br />ID: 343127</h1>
    </div>

    <div class="first-menu">
      <div class="menu-item">
        <img src="images/Untitled design (1).png" alt="invite icon" />
        <p>Invite</p>
      </div>

      <div class="menu-item">
        <img src="images/Untitled design (26).png" alt="Miner icon" />
        <p>Miner</p>
      </div>

      <div class="menu-item">
        <img src="images/Untitled design (27).png" alt="Bonus icon" />
        <p>Bonus</p>
      </div>

      <div class="menu-item">
        <img src="images/Untitled design (22).png" alt="Company icon" />
        <p>Company</p>
      </div>
    </div>
    <div class="stats-card">
      <div class="stats">
        <h2>3.00</h2>
        <p>Balance</p>
      </div>
      <div class="stats">
        <h2>20.28</h2>
        <p>Team Income</p>
      </div>
      <div class="stats">
        <h2>164</h2>
        <p>Points</p>
      </div>
    </div>
    <div class="platform-box">
      <h3>Platform is running securely</h3>
      <div class="time">
        <div>
          <h2>1079</h2>
          <p>days</p>
        </div>
        <div>
          <h2>9</h2>
          <p>hours</p>
        </div>
        <div>
          <h2>45</h2>
          <p>minutes</p>
        </div>
        <div>
          <h2>33</h2>
          <p>seconds</p>
        </div>
      </div>
    </div>
    <div class="coin-table">
      <div class="row header-row">
        <span>Coin</span>
        <span>Price</span>
        <span>24h</span>
      </div>

      <div class="row">
        <span>BTC</span>
        <span>67334.63</span>
        <span class="positive">1.431%</span>
      </div>

      <div class="row">
        <span>ETH</span>
        <span>1954.05</span>
        <span class="positive">1.541%</span>
      </div>

      <div class="row">
        <span>BNB</span>
        <span>620.96</span>
        <span class="positive">2.220%</span>
      </div>
      <div class="row">
        <span>XRP</span>
        <span>620.96</span>
        <span class="positive">2.220%</span>
      </div>
    </div>
    <div class="bottom-nav">
      <span class="active" id="homeBtn">Home</span>
      <span id="shopBtn">Shop</span>
      <span id="pledgeBtn">Pledge</span>
      <span id="mineBtn">Mine</span>
    </div>
    <script src="JS/script.js"></script>
  </body>
</html>
