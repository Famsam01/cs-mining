<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS Mining</title>
    <link rel="stylesheet" href="testing.css" />
  </head>
  <body>
    <div class="header-row">
      <div class="logo">
        <img src="images/Untitled design.jpg" alt="CS Mining Logo" />
      </div>
      <h1>User Registration</h1>
    </div>
    <div class="form">
      <input type="text" placeholder="Please enter your phone number" />
      <input type="password" placeholder="Please enter your password" />
      <input type="password" placeholder="Please confirm your password" />
      <input type="number" placeholder="Please enter an invitation code" />
      <div class="captcha-row">
        <input type="number" placeholder="Verification code" />
        <div class="captcha">
          <p>5 + 4 = ?</p>
        </div>
      </div>
    </div>
    <button type="submit">Register</button>
    <p class="signup">
      Already have an account? <a href="testing.html">Login here</a>
    </p>
  </body>
</html>
