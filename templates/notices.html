<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notices</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style/home.css') }}"
    />
  </head>
  <body>
    <h1 class="cs-miners">News Feed</h1>

    {% if notices %}
    <div class="notice-list">
      {% for n in notices %}
      <div class="notice-card notice-{{ n.type }}">
        <div class="notice-header">
          <span class="notice-icon">
            {% if n.type == 'warning' %}⚠️ {% elif n.type == 'success' %}✅ {%
            else %}📢{% endif %}
          </span>
          <div>
            <p class="notice-title">{{ n.title }}</p>
            <p class="notice-date">
              {{ n.created_at.strftime('%d %b %Y, %I:%M %p') }}
            </p>
          </div>
        </div>
        <p class="notice-content">{{ n.content }}</p>
        <div class="svg">
          <a
            href="https://whatsapp.com/channel/0029VbCri8n3WHTVHPSCDJ1V"
            target="_blank"
          >
            <img src="/static/images/WhatsApp-Logo.svg" />
          </a>
          <a href="https://t.me/cs_mining_community" target="_blank">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              width="24"
              height="24"
            >
              <path
                d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"
              />
            </svg>
          </a>
        </div>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <div class="empty-state">
      <p>📭 No notices at this time.</p>
    </div>
    {% endif %}

    <div class="bottom-nav">
      <button id="homeBtn">Home</button>
      <button id="shopBtn">Shop</button>
      <button class="active">News Feed</button>
      <button id="mineBtn">Mine</button>
    </div>

    <script src="/static/JS/script.js"></script>
  </body>
</html>
