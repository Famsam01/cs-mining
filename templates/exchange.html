<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exchange</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style/invite.css') }}"
    />
  </head>
  <body>
    <div class="header">
      <svg
        id="backBtn"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="size-6"
      >
        <path
          fill-rule="evenodd"
          d="M7.72 12.53a.75.75 0 0 1 0-1.06l7.5-7.5a.75.75 0 1 1 1.06 1.06L9.31 12l6.97 6.97a.75.75 0 1 1-1.06 1.06l-7.5-7.5Z"
          clip-rule="evenodd"
        />
      </svg>
      <h1>Exchange</h1>
      <svg
        id="homeBtn"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="size-6"
      >
        <path
          d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 0 1.06-1.061l-8.689-8.69a2.25 2.25 0 0 0-3.182 0l-8.69 8.69a.75.75 0 1 0 1.061 1.06l8.69-8.689Z"
        />
        <path
          d="m12 5.432 8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 0-.75-.75h-3a.75.75 0 0 0-.75.75V21a.75.75 0 0 1-.75.75H5.625a1.875 1.875 0 0 1-1.875-1.875v-6.198a2.29 2.29 0 0 0 .091-.086L12 5.432Z"
        />
      </svg>
    </div>

    <div class="levels">
      <div class="stats">
        <h3>My Balance($)</h3>
        <p id="balance-display">{{ "%.2f"|format(user.wallet_balance) }}</p>
      </div>
      <div class="stats">
        <h3>Points</h3>
        <p id="points-display">{{ user.points }}</p>
      </div>
    </div>

    <!-- Rate info -->
    <div class="exchange-rate">
      <span>💱 500 points = $1.00 USD</span>
    </div>

    <!-- Errors -->
    {% if errors %}
    <div class="withdraw-errors">
      {% for e in errors %}
      <p>⚠ {{ e }}</p>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Success -->
    {% if success %}
    <div class="withdraw-success">
      <p>✅ {{ success }}</p>
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" class="exchange-form">
      <div class="form">
        <input
          type="number"
          name="points"
          min="500"
          step="500"
          placeholder="Enter points (min 500)"
          id="pointsInput"
          oninput="calcExchange(this.value)"
          required
        />
        <div
          class="exchange-preview"
          id="exchangePreview"
          style="display: none"
        >
          <div class="fee-row">
            <span>Points used</span><span id="ptsUsed">0</span>
          </div>
          <div class="fee-row">
            <span>Points kept</span><span id="ptsKept">0</span>
          </div>
          <div class="fee-row total">
            <span>You receive</span><span id="usdOut">$0.00</span>
          </div>
        </div>

        <button type="submit" class="withdraw-btn">Exchange Now</button>
      </div>
    </form>

    <script src="/static/JS/script.js"></script>
  </body>
</html>
