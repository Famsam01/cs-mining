<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS Mining</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style/login.css') }}"
    />
  </head>
  <body>
    <div class="header-row">
      <div class="logo">
        <img src="/static/images/cs-logo.jpg" alt="CS Mining Logo" />
      </div>
      <h1>User Registration</h1>
    </div>

    {% if errors %}
    <div>
      <ul>
        {% for e in errors %}
        <li>{{ e }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}

    <form method="POST">
      <div class="form">
        <input
          type="number"
          name="phone"
          placeholder="Please enter your phone number"
          required
        />
        <div class="password-wrap">
          <input
            name="password"
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
          <button type="button" class="toggle-pw" onclick="togglePassword('password')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="password-wrap">
          <input
            name="confirm_password"
            type="password"
            id="confirm_password"
            placeholder="Confirm your password"
            required
          />
          <button type="button" class="toggle-pw" onclick="togglePassword('confirm_password')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        {% if not is_first_user %}  
          <input
            type="number"
            name="invite"
            placeholder="Please enter an invitation code"
            value="{{ prefilled_invite }}" 
            {{ 'readonly' if prefilled_invite else '' }}
            required
          />
        {% else %}      
          <input type="hidden" name="invite" value="" />
        {% endif %}
      
        <button type="submit">Register</button>
      </div>
    </form>
    <p class="signup">
      Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
    <script src="/static/JS/script.js"></script>
  </body>
</html>
