<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style/login.css') }}"
    />
    <title>CS Mining</title>
  </head>
  <body>
    <div class="header-row">
      <div class="logo">
        <img src="/static/images/cs-logo.jpg" alt="CS Mining Logo" />
      </div>
      <h1>User Login</h1>
    </div>

    {% if errors %}
    <div>
      <ul>
        {% for e in errors %}
        <li>{{ e }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}

    <form method="POST">
      <div class="form">
        <input
          name="phone"
          type="number"
          placeholder="Enter your phone number"
          required
        />
        <div class="password-wrap">
          <input
            name="password"
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
          <button
            type="button"
            class="toggle-pw"
            onclick="togglePassword('password')"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              width="18"
              height="18"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <div class="secondary">
          <div class="checkbox">
            <input name="remember" value="1" type="checkbox" />
            <label class="script">Remember Me</label>
          </div>
          <button>Forgot Password?</button>
        </div>
        <button type="submit">Login</button>
      </div>
    </form>
    <p class="signup">
      No account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
    <script src="/static/JS/script.js"></script>
  </body>
</html>
