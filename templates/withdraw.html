<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/style/invite.css" />
    <title>CS Mining</title>
  </head>
  <body>
    <div class="header">
      <svg
        id="backBtn"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="size-6"
      >
        <path
          fill-rule="evenodd"
          d="M7.72 12.53a.75.75 0 0 1 0-1.06l7.5-7.5a.75.75 0 1 1 1.06 1.06L9.31 12l6.97 6.97a.75.75 0 1 1-1.06 1.06l-7.5-7.5Z"
          clip-rule="evenodd"
        />
      </svg>
      <h1>Withdrawal</h1>
      <svg
        id="withdrawhistoryBtn"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"
        />
      </svg>
    </div>
    <div class="levels">
      <div class="stats">
        <h3>My Balance($)</h3>
        <p id="balance-display">{{ "%.2f"|format(user.wallet_balance) }}</p>
      </div>
      <div class="stats">
        <h3>Team Income($)</h3>
        <p id="income-display">{{ "%.2f"|format(user.team_income) }}</p>
      </div>
    </div>

    {% if account %}
    <form method="POST">
      <div class="form">
        <div class="withdraw-fee-preview" id="feePreview" style="display: none">
          <div class="fee-row">
            <span>Fee (10%)</span><span id="feeAmt">$0.00</span>
          </div>
          <div class="fee-row total">
            <span>You receive</span><span id="netAmt">$0.00</span>
          </div>
        </div>
        <input
          oninput="calcFee(this.value)"
          id="withdrawAmount"
          type="number"
          name="amount"
          step="any"
          min="5"
          placeholder="Enter the withdrawal amount (min $5, max $1000)"
          required
        />
        <button type="submit">Submit</button>
      </div>
    </form>
    {% else %}
    <div class="withdraw-no-bank">
      ⚠ No bank account saved.
      <a href="/bank">Add one here</a>
    </div>
    {% endif %}

    <script>
      function calcFee(val) {
        const amount = parseFloat(val);
        const preview = document.getElementById("feePreview");
        if (!val || isNaN(amount) || amount <= 0) {
          preview.style.display = "none";
          return;
        }
        const fee = (amount * 0.1).toFixed(2);
        const net = (amount - fee).toFixed(2);
        document.getElementById("feeAmt").textContent = "$" + fee;
        document.getElementById("netAmt").textContent = "$" + net;
        preview.style.display = "block";
      }
    </script>
    <script src="/static/JS/script.js"></script>
  </body>
</html>
